<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Downloader - DevSave Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --text-muted: #8080a0;
            --accent: #1877f2;
            --accent2: #6c5ce7;
            --accent3: #00d4ff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 20px;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --glow: 0 0 40px rgba(24, 119, 242, 0.08);
        }

        [data-theme="light"] {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(0, 0, 0, 0.06);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8080a0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --glow: 0 0 40px rgba(24, 119, 242, 0.04);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
            opacity: 0;
            animation: bodyFadeIn 0.8s ease forwards;
        }

        @keyframes bodyFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            border-top-color: var(--accent);
            border-right-color: var(--accent2);
            border-bottom-color: var(--accent3);
            animation: spinLoader 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        @keyframes spinLoader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            animation: pulseText 1.5s ease-in-out infinite;
        }

        .loader-text span {
            color: var(--accent);
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loader-progress {
            margin-top: 1.5rem;
            width: 200px;
            height: 3px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            border-radius: 10px;
            animation: progressLoad 2s ease-in-out forwards;
        }

        @keyframes progressLoad {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(24, 119, 242, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(108, 92, 231, 0.04) 0%, transparent 50%),
                var(--bg-primary);
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            box-shadow: var(--shadow), var(--glow);
            transition: var(--transition);
        }

        .glass:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(24, 119, 242, 0.08), var(--glow);
            border-color: rgba(24, 119, 242, 0.12);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1877f2, #6c5ce7, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease infinite;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .logo i {
            -webkit-text-fill-color: initial;
            color: #1877f2;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateX(-5px);
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--accent);
            color: white;
        }

        .version-badge {
            background: linear-gradient(135deg, #1877f2, #6c5ce7);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulseBadge 2s infinite;
        }

        @keyframes pulseBadge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 120px 2rem 4rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header .icon {
            font-size: 4rem;
            color: #1877f2;
            margin-bottom: 1rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .page-header .active-status {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.12);
            animation: pulseActive 2s infinite;
        }

        @keyframes pulseActive {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .download-card {
            padding: 2.5rem;
            animation: fadeUp 0.8s ease 0.2s both;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            min-width: 200px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 4px rgba(24, 119, 242, 0.08);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .input-group .paste-btn {
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .input-group .paste-btn:hover {
            border-color: #1877f2;
            background: rgba(24, 119, 242, 0.06);
            transform: scale(1.05);
        }

        .quality-section {
            margin: 1.5rem 0;
        }

        .quality-section .label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            display: block;
        }

        .quality-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .quality-btn {
            padding: 0.6rem 1.2rem;
            background: var(--bg-card);
            border: 2px solid var(--border-glass);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
        }

        .quality-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1877f2, #6c5ce7);
            opacity: 0;
            transition: var(--transition);
        }

        .quality-btn:hover::before {
            opacity: 0.06;
        }

        .quality-btn:hover {
            transform: translateY(-3px);
            border-color: #1877f2;
            color: var(--text-primary);
        }

        .quality-btn.active {
            border-color: #1877f2;
            background: rgba(24, 119, 242, 0.08);
            color: #1877f2;
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.06);
        }

        .quality-btn .badge {
            font-size: 0.6rem;
            opacity: 0.6;
            display: block;
            font-weight: 400;
        }

        .download-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #1877f2, #6c5ce7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #6c5ce7, #00d4ff);
            opacity: 0;
            transition: var(--transition);
        }

        .download-btn:hover::before {
            opacity: 1;
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 32px rgba(24, 119, 242, 0.2);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-btn i,
        .download-btn span {
            position: relative;
            z-index: 1;
        }

        .download-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .download-btn .spinner {
            display: none;
            animation: spin 1s linear infinite;
            position: relative;
            z-index: 1;
        }

        .download-btn.loading .spinner {
            display: inline-block;
        }
        .download-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .progress-container {
            display: none;
            margin-top: 1.5rem;
        }

        .progress-container.show {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 0.5rem;
            border: 1px solid var(--border-glass);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1877f2, #6c5ce7, #00d4ff);
            background-size: 200% 100%;
            animation: progressGradient 2s ease infinite;
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }

        @keyframes progressGradient {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .result-card {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            animation: fadeUp 0.5s ease;
        }

        .result-card.show {
            display: block;
        }

        .result-card .video-info {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .result-card .thumbnail {
            width: 200px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
        }

        .result-card .details {
            flex: 1;
            min-width: 200px;
        }

        .result-card .details h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
        }

        .result-card .details p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0.2rem 0;
        }

        .result-card .details .meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .result-card .details .meta span {
            background: var(--bg-card);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
        }

        .result-card .action-btns {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .result-card .action-btns .download-now-btn {
            flex: 1;
            min-width: 150px;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #1877f2, #6c5ce7);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .result-card .action-btns .download-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(24, 119, 242, 0.2);
        }

        .result-card .action-btns .copy-link-btn {
            flex: 1;
            min-width: 150px;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .result-card .action-btns .copy-link-btn:hover {
            border-color: #1877f2;
            transform: translateY(-3px);
        }

        .status-msg {
            margin-top: 1rem;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: fadeUp 0.4s ease;
        }

        .status-msg.show {
            display: flex;
        }

        .status-msg.info {
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.12);
            color: #00d4ff;
        }

        .status-msg.success {
            background: rgba(0, 255, 136, 0.06);
            border: 1px solid rgba(0, 255, 136, 0.12);
            color: #00ff88;
        }

        .status-msg.error {
            background: rgba(255, 68, 68, 0.06);
            border: 1px solid rgba(255, 68, 68, 0.12);
            color: #ff4444;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 65px;
            height: 65px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.2rem;
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            animation: whatsappPulse 2s ease-in-out infinite;
        }

        .whatsapp-float:hover {
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 12px 48px rgba(37, 211, 102, 0.5);
        }

        @keyframes whatsappPulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 48px rgba(37, 211, 102, 0.5);
            }
        }

        .whatsapp-float .tooltip {
            position: absolute;
            right: 80px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: var(--transition);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
        }

        .whatsapp-float:hover .tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            position: relative;
            z-index: 1;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--border-glass);
            margin-top: 4rem;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-socials a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .footer-socials a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--accent2), transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .footer-socials a:hover::before {
            opacity: 0.08;
        }

        .footer-socials a:hover {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .footer-socials a.facebook:hover {
            color: #1877f2;
            border-color: #1877f2;
        }
        .footer-socials a.instagram:hover {
            color: #e4405f;
            border-color: #e4405f;
        }
        .footer-socials a.twitter:hover {
            color: #1da1f2;
            border-color: #1da1f2;
        }
        .footer-socials a.whatsapp:hover {

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1500);
        });

        // ===== PARTICLES =====
        (function particles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            const particleCount = 60;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.radius = Math.random() * 2 + 1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    const accent = getComputedStyle(document.documentElement)
                        .getPropertyValue('--accent').trim() || '#1877f2';
                    ctx.fillStyle = accent.replace(')', `, ${this.opacity})`).replace('rgb', 'rgba');
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const opacity = (1 - dist / 150) * 0.08;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const accent = getComputedStyle(document.documentElement)
                                .getPropertyValue('--accent').trim() || '#1877f2';
                            ctx.strokeStyle = accent.replace(')', `, ${opacity})`).replace('rgb', 'rgba');
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                drawLines();
                requestAnimationFrame(animateParticles);
            }

            resize();
            initParticles();
            animateParticles();

            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });
        })();

        // ===== THEME =====
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');

        function getTheme() {
            return localStorage.getItem('theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        themeToggle.addEventListener('click', () => {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        setTheme(getTheme());

        // ===== QUALITY =====
        let selectedQuality = 'sd';
        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedQuality = btn.dataset.quality;
            });
        });

        // ===== PASTE =====
        document.getElementById('pasteBtn').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
                showToast('✅ URL pasted!', 'success');
            } catch {
                showToast('❌ Could not paste. Please paste manually.', 'error');
            }
        });

        // ===== DOWNLOAD =====
        const downloadBtn = document.getElementById('downloadBtn');
        const urlInput = document.getElementById('urlInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');
        const resultCard = document.getElementById('resultCard');
        const statusMsg = document.getElementById('statusMsg');

        // ===== FACEBOOK API V3 - WORKING =====
        const FB_API = 'https://apis.davidcyril.name.ng/facebook3';

        let currentDownloadUrl = '';

        downloadBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();

            if (!url) {
                showToast('❌ Please paste a Facebook URL', 'error');
                urlInput.focus();
                return;
            }

            if (!url.includes('facebook.com') && !url.includes('fb.com') && !url.includes('fb.watch')) {
                showToast('❌ Please enter a valid Facebook URL', 'error');
                return;
            }

            downloadBtn.classList.add('loading');
            progressContainer.classList.add('show');
            resultCard.classList.remove('show');
            statusMsg.classList.remove('show');
            progressFill.style.width = '0%';
            progressText.textContent = 'Initializing...';
            progressPercent.textContent = '0%';

            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += Math.random() * 8 + 2;
                if (progress > 95) progress = 95;
                progressFill.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress) + '%';
                if (progress < 30) progressText.textContent = 'Connecting to server...';
                else if (progress < 60) progressText.textContent = 'Processing video...';
                else if (progress < 85) progressText.textContent = 'Generating download link...';
                else progressText.textContent = 'Almost there...';
            }, 300);

            try {
                statusMsg.className = 'status-msg show info';
                statusMsg.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Fetching from Facebook...`;

                // ===== FACEBOOK API V3 WITH ?url= =====
                const response = await fetch(`${FB_API}?url=${encodeURIComponent(url)}`);

                clearInterval(progressInterval);

                if (response.ok) {
                    const data = await response.json();

                    if (data.url) {
                        currentDownloadUrl = data.url;
                        progressFill.style.width = '100%';
                        progressPercent.textContent = '100%';
                        progressText.textContent = '✅ Done!';

                        statusMsg.className = 'status-msg show success';
                        statusMsg.innerHTML = `<i class="fas fa-check-circle"></i> Download ready!`;

                        setTimeout(() => {
                            document.getElementById('thumbnail').src = data.cover || 'https://via.placeholder.com/200x120/1877f2/ffffff?text=Facebook';
                            document.getElementById('videoTitle').textContent = 'Facebook Video';
                            document.getElementById('videoInfo').textContent = 'Facebook Video';
                            document.getElementById('videoQuality').textContent = selectedQuality.toUpperCase();
                            document.getElementById('videoSize').textContent = 'Processing...';

                            resultCard.classList.add('show');
                            showToast('✅ Download ready! Click Download Now', 'success');

                            setTimeout(() => {
                                window.open(currentDownloadUrl, '_blank');
                            }, 500);
                        }, 500);
                    } else {
                        statusMsg.className = 'status-msg show error';
                        statusMsg.innerHTML = `<i class="fas fa-exclamation-circle"></i> Failed to get download link.`;
                        showToast('❌ Failed to generate download link', 'error');
                    }
                } else {
                    statusMsg.className = 'status-msg show error';
                    statusMsg.innerHTML = `<i class="fas fa-exclamation-circle"></i> Server error. Please try again.`;
                    showToast('❌ Server error. Please try again.', 'error');
                }

            } catch (error) {
                clearInterval(progressInterval);
                statusMsg.className = 'status-msg show error';
                statusMsg.innerHTML = `<i class="fas fa-exclamation-circle"></i> Error: ${error.message}`;
                showToast('❌ Something went wrong', 'error');
            } finally {
                downloadBtn.classList.remove('loading');
                setTimeout(() => {
                    progressContainer.classList.remove('show');
                }, 3000);
            }
        });

        // ===== DOWNLOAD NOW =====
        document.getElementById('downloadNowBtn').addEventListener('click', () => {
            if (currentDownloadUrl) {
                window.open(currentDownloadUrl, '_blank');
                showToast('⬇️ Download started!', 'success');
            } else {
                showToast('❌ No download link available. Generate one first.', 'error');
            }
        });

        // ===== COPY LINK =====
        document.getElementById('copyLinkBtn').addEventListener('click', async () => {
            if (currentDownloadUrl) {
                try {
                    await navigator.clipboard.writeText(currentDownloadUrl);
                    showToast('✅ Link copied to clipboard!', 'success');
                } catch {
                    showToast('❌ Failed to copy link', 'error');
                }
            } else {
                showToast('❌ No link to copy', 'error');
            }
        });

        // ===== TOAST =====
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            toast.innerHTML = `<i class="fas ${iconMap[type] || iconMap.info}"></i> ${message}`;
            document.body.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        console.log('%c📘 DevSave Pro - Facebook Downloader', 'font-size:20px; font-weight:bold; color:#1877f2;');
        console.log('%c💻 Built with ❤️ by Dev Gift', 'font-size:14px; color:#a0a0c0;');
        console.log('%c📡 Using Facebook API V3', 'font-size:12px; color:#00d4ff;');
    </script>
