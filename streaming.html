<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Sports Streaming - DevSave Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #111122;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --text-muted: #666688;
            --accent: #ff00ff;
            --accent2: #6c5ce7;
            --accent3: #00d4ff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --glow: 0 0 40px rgba(255, 0, 255, 0.06);
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(0, 0, 0, 0.06);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --glow: 0 0 40px rgba(255, 0, 255, 0.03);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
            opacity: 0;
            animation: bodyFadeIn 0.8s ease forwards;
        }

        @keyframes bodyFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            border-top-color: var(--accent);
            border-right-color: var(--accent2);
            border-bottom-color: var(--accent3);
            animation: spinLoader 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        @keyframes spinLoader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            animation: pulseText 1.5s ease-in-out infinite;
        }

        .loader-text span {
            color: var(--accent2);
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loader-progress {
            margin-top: 1.5rem;
            width: 200px;
            height: 3px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            border-radius: 10px;
            animation: progressLoad 2s ease-in-out forwards;
        }

        @keyframes progressLoad {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 0, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(108, 92, 231, 0.03) 0%, transparent 50%),
                var(--bg-primary);
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            box-shadow: var(--shadow), var(--glow);
            transition: var(--transition);
        }

        .glass:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 0, 255, 0.08), var(--glow);
            border-color: rgba(255, 0, 255, 0.08);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 0.8rem 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff00ff, #6c5ce7, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease infinite;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .logo i {
            -webkit-text-fill-color: initial;
            color: #ff00ff;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateX(-5px);
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--accent);
            color: white;
        }

        .version-badge {
            background: linear-gradient(135deg, #ff00ff, #6c5ce7);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulseBadge 2s infinite;
        }

        @keyframes pulseBadge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 100px 2rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header .icon {
            font-size: 3.5rem;
            color: #ff00ff;
            margin-bottom: 0.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .page-header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .page-header .active-status {
            display: inline-block;
            margin-top: 0.3rem;
            padding: 0.2rem 1rem;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.12);
            animation: pulseActive 2s infinite;
        }

        @keyframes pulseActive {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .sports-tabs {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .sports-tab {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .sports-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .sports-tab.active {
            background: linear-gradient(135deg, #ff00ff, #6c5ce7);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(255, 0, 255, 0.2);
        }

        .sports-tab .count {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.05rem 0.4rem;
            border-radius: 50px;
            font-size: 0.55rem;
            margin-left: 0.2rem;
        }

        .streams-container {
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .streams-container.active {
            display: block;
        }

        /* ===== MATCH CARD - TV STYLE ===== */
        .match-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            opacity: 0;
            transition: var(--transition);
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 0, 255, 0.15);
            box-shadow: 0 12px 48px rgba(255, 0, 255, 0.08);
        }

        .match-card .match-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .match-card .match-teams {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .match-card .team {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .match-card .team .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: contain;
            background: var(--bg-card);
            padding: 4px;
            border: 2px solid var(--border-glass);
            transition: var(--transition);
        }

        .match-card .team .team-logo:hover {
            transform: scale(1.1);
            border-color: var(--accent2);
        }

        .match-card .team .team-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .match-card .team .team-score {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--accent2);
            min-width: 35px;
            text-align: center;
            background: var(--bg-card);
            padding: 0 0.4rem;
            border-radius: 8px;
            border: 1px solid var(--border-glass);
        }

        .match-card .team .team-score.winner {
            color: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .match-card .vs-badge {
            color: var(--text-muted);
            font-weight: 800;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            background: var(--bg-card);
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            letter-spacing: 1px;
        }

        .match-card .match-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .match-card .sport-tag {
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 200, 255, 0.1);
            color: #00c8ff;
            border: 1px solid rgba(0, 200, 255, 0.12);
        }

        .match-card .sport-tag.football {
            background: rgba(0, 200, 255, 0.1);
            color: #00c8ff;
            border-color: rgba(0, 200, 255, 0.12);
        }
        .match-card .sport-tag.basketball {
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            border-color: rgba(255, 165, 0, 0.12);
        }
        .match-card .sport-tag.cricket {
            background: rgba(0, 255, 0, 0.08);
            color: #00ff00;
            border-color: rgba(0, 255, 0, 0.1);
        }
        .match-card .sport-tag.soccer {
            background: rgba(255, 255, 0, 0.08);
            color: #ffff00;
            border-color: rgba(255, 255, 0, 0.1);
        }

        .match-card .status-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .match-card .status-badge.live {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.2);
            animation: livePulse 1.5s infinite;
        }

        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.98);
            }
        }

        .match-card .status-badge.final {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.12);
        }

        .match-card .status-badge.scheduled {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.12);
        }

        .match-card .league-name {
            font-size: 0.6rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .match-card .match-time {
            font-size: 0.6rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--bg-card);
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .match-card .match-time i {
            font-size: 0.5rem;
            color: var(--accent2);
        }

        .match-card .match-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-glass);
        }

        .match-card .watch-btn {
            padding: 0.5rem 1.8rem;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #ff00ff, #6c5ce7);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 4px 20px rgba(255, 0, 255, 0.2);
        }

        .match-card .watch-btn i {
            font-size: 0.7rem;
        }

        .match-card .watch-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 0, 255, 0.4);
        }

        .match-card .watch-btn.live-btn {
            background: linear-gradient(135deg, #ff4444, #ff00ff);
            animation: btnPulse 2s infinite;
        }

        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 4px 20px rgba(255, 0, 255, 0.2);
            }
            50% {
                box-shadow: 0 4px 40px rgba(255, 0, 255, 0.5);
            }
        }

        .match-card .watch-btn.scheduled-btn {
            background: linear-gradient(135deg, #00d4ff, #6c5ce7);
        }

        .match-card .watch-btn.final-btn {
            background: linear-gradient(135deg, #00ff88, #6c5ce7);
            opacity: 0.7;
        }

        .match-card .watch-btn.final-btn:hover {
            opacity: 1;
        }

        .match-card .no-stream-text {
            font-size: 0.6rem;
            color: var(--text-muted);
            padding: 0.3rem 0.8rem;
            background: var(--bg-card);
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .streams-loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .streams-loading .spinner {
            animation: spin 1s linear infinite;
            font-size: 2rem;
            color: var(--accent2);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-streams {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .no-streams i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 60px;
            height: 60px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            animation: whatsappPulse 2s ease-in-out infinite;
        }

        .whatsapp-float:hover {
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 12px 48px rgba(37, 211, 102, 0.45);
        }

        @keyframes whatsappPulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 48px rgba(37, 211, 102, 0.45);
            }
        }

        .whatsapp-float .tooltip {
            position: absolute;
            right: 75px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: var(--transition);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
        }

        .whatsapp-float:hover .tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            position: relative;
            z-index: 1;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--border-glass);
            margin-top: 4rem;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-socials a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .footer-socials a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--accent2), transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .footer-socials a:hover::before {
            opacity: 0.08;
        }

        .footer-socials a:hover {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .footer-socials a.facebook:hover {
            color: #1877f2;
            border-color: #1877f2;
        }

<body>

    <!-- ===== LOADING ===== -->
    <div id="loadingOverlay">

    <!-- ===== MAIN ===== -->

            <button class="sports-tab" data-sport="basketball">🏀 Basketball <span class="count" id="basketballCount">0</span></button>

        </div>

        <!-- ===== STREAMS ===== -->
        <div class="streams-container active" id="streamsContainer">

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1500);
        });

        // ===== PARTICLES =====
        (function particles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            const particleCount = 50;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.radius = Math.random() * 2 + 1;
                    this.opacity = Math.random() * 0.3 + 0.1;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    const accent = getComputedStyle(document.documentElement)
                        .getPropertyValue('--accent').trim() || '#ff00ff';
                    ctx.fillStyle = accent.replace(')', `, ${this.opacity})`).replace('rgb', 'rgba');
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const opacity = (1 - dist / 150) * 0.05;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const accent = getComputedStyle(document.documentElement)
                                .getPropertyValue('--accent').trim() || '#ff00ff';
                            ctx.strokeStyle = accent.replace(')', `, ${opacity})`).replace('rgb', 'rgba');
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                drawLines();
                requestAnimationFrame(animateParticles);
            }

            resize();
            initParticles();
            animateParticles();

            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });
        })();

        // ===== THEME =====
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');

        function getTheme() {
            return localStorage.getItem('theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        themeToggle.addEventListener('click', () => {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        setTheme(getTheme());

        // ===== STREAMING API =====
        const STREAM_API = 'https://api.princetechn.com/api/football/streaming/all?apikey=prince';

        let allMatches = [];

        async function fetchStreams() {
            const container = document.getElementById('streamsContainer');
            const loading = document.getElementById('streamsLoading');

            try {
                const response = await fetch(STREAM_API);

                if (response.ok) {
                    const data = await response.json();

                    if (data.success && data.result) {
                        allMatches = data.result.matches || [];
                        const total = data.result.totalMatches || allMatches.length;

                        document.getElementById('allCount').textContent = total;

                        const football = allMatches.filter(m => m.sport === 'football' || m.sport === 'soccer');
                        const basketball = allMatches.filter(m => m.sport === 'basketball');
                        const cricket = allMatches.filter(m => m.sport === 'cricket');

                        document.getElementById('footballCount').textContent = football.length;
                        document.getElementById('basketballCount').textContent = basketball.length;
                        document.getElementById('cricketCount').textContent = cricket.length;

                        renderStreams('all', allMatches);
                    } else {
                        container.innerHTML = `
                            <div class="no-streams">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>No streams available</p>
                            </div>
                        `;
                    }
                } else {
                    container.innerHTML = `
                        <div class="no-streams">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Failed to load streams. Please try again.</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('Streams error:', error);
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading streams. Please try again.</p>
                    </div>
                `;
            }

            loading.style.display = 'none';
        }

        function formatTime(dateString) {
            if (!dateString) return 'Unknown';
            try {
                const date = new Date(dateString);
                return date.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return dateString;
            }
        }

        function getStatusInfo(status) {
            const isLive = status === 'Live' || status === 'In Progress' || status === '1st Half' || status === '2nd Half';
            const isFinal = status === 'Full Time' || status === 'FT';
            const isScheduled = status === 'Not Started' || status === 'Scheduled';

            let statusClass = 'scheduled';
            let statusText = status || 'Scheduled';
            let btnClass = 'scheduled-btn';
            let btnText = 'Watch Now';

            if (isLive) {
                statusClass = 'live';
                statusText = '🔴 LIVE';
                btnClass = 'live-btn';
                btnText = '▶ Watch Live';
            } else if (isFinal) {
                statusClass = 'final';
                statusText = '✅ Full Time';
                btnClass = 'final-btn';
                btnText = '📹 Watch Replay';
            }

            return { statusClass, statusText, btnClass, btnText };
        }

        function renderStreams(sport, matches) {
            const container = document.getElementById('streamsContainer');

            let filtered = matches;
            if (sport !== 'all') {
                filtered = matches.filter(m => m.sport === sport || (sport === 'football' && m.sport === 'soccer'));
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-futbol"></i>
                        <p>No ${sport} streams available</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(match => {
                const homeScore = match.homeScore || '0';
                const awayScore = match.awayScore || '0';
                const homeLogo = match.homeLogo || '';
                const awayLogo = match.awayLogo || '';

                const streamUrl = match.streams && match.streams.length > 0 ? match.streams[0].url : null;
                const streamTitle = match.streams && match.streams.length > 0 ? match.streams[0].title : 'Watch';

                let sportClass = 'football';
                const sportName = match.sport || 'football';
                if (sportName === 'basketball') sportClass = 'basketball';
                else if (sportName === 'cricket') sportClass = 'cricket';
                else if (sportName === 'soccer') sportClass = 'soccer';

                const startTime = match.startTime ? formatTime(match.startTime) : 'Unknown';
                const statusInfo = getStatusInfo(match.status);
                const isHomeWinner = match.status === 'Full Time' || match.status === 'FT' ? parseInt(homeScore) > parseInt(awayScore) : false;
                const isAwayWinner = match.status === 'Full Time' || match.status === 'FT' ? parseInt(awayScore) > parseInt(homeScore) : false;

                const card = document.createElement('div');
                card.className = 'match-card';

                card.innerHTML = `
                    <div class="match-top">
                        <div class="match-teams">
                            <div class="team">
                                <img class="team-logo" src="${homeLogo || 'https://via.placeholder.com/50/ff00ff/ffffff?text=?'}" alt="${match.homeTeam}" onerror="this.src='https://via.placeholder.com/50/ff00ff/ffffff?text=?'" />
                                <span class="team-name">${match.homeTeam || 'Home'}</span>
                                <span class="team-score ${isHomeWinner ? 'winner' : ''}">${homeScore}</span>
                            </div>
                            <span class="vs-badge">VS</span>
                            <div class="team">
                                <img class="team-logo" src="${awayLogo || 'https://via.placeholder.com/50/ff00ff/ffffff?text=?'}" alt="${match.awayTeam}" onerror="this.src='https://via.placeholder.com/50/ff00ff/ffffff?text=?'" />
                                <span class="team-name">${match.awayTeam || 'Away'}</span>
                                <span class="team-score ${isAwayWinner ? 'winner' : ''}">${awayScore}</span>
                            </div>
                        </div>
                        <div class="match-meta">
                            <span class="sport-tag ${sportClass}">${sportName}</span>
                            <span class="status-badge ${statusInfo.statusClass}">${statusInfo.statusText}</span>
                            <span class="league-name">${match.league || 'Unknown'}</span>
                            <span class="match-time">
                                <i class="far fa-clock"></i> ${startTime}
                            </span>
                        </div>
                    </div>
                    <div class="match-bottom">
                        ${streamUrl ? `
                            <a href="${streamUrl}" target="_blank" class="watch-btn ${statusInfo.btnClass}">
                                <i class="fas fa-play"></i> ${statusInfo.btnText}
                            </a>
                        ` : `
                            <span class="no-stream-text">🚫 No stream available</span>
                        `}
                        <span style="font-size:0.55rem; color:var(--text-muted); opacity:0.5;">
                            ${match.streams && match.streams.length > 1 ? `+${match.streams.length - 1} more streams` : ''}
                        </span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ===== TABS =====
        document.querySelectorAll('.sports-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.sports-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const sport = tab.dataset.sport;
                renderStreams(sport, allMatches);
            });
        });

        // ===== TOAST =====
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            toast.innerHTML = `<i class="fas ${iconMap[type] || iconMap.info}"></i> ${message}`;
            document.body.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // ===== FETCH ON LOAD =====
        fetchStreams();

        setInterval(fetchStreams, 60000);

        console.log('%c📺 DevSave Pro - Live Sports Streaming', 'font-size:20px; font-weight:bold; color:#ff00ff;');
        console.log('%c💻 Built with ❤️ by Dev Gift', 'font-size:14px; color:#a0a0c0;');
        console.log('%c🏆 All Sports - Football, Basketball, Cricket & more!', 'font-size:12px; color:#00d4ff;');
    </script>
