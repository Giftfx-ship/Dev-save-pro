<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Sports Streaming - DevSave Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #050510;
            --bg-secondary: #0a0a1a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #c0c0d8;
            --text-muted: #606080;
            --accent: #ff00ff;
            --accent2: #6c5ce7;
            --accent3: #00d4ff;
            --accent4: #ff6b9d;
            --shadow: 0 8px 48px rgba(0, 0, 0, 0.8);
            --radius: 16px;
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            --glow: 0 0 60px rgba(255, 0, 255, 0.04);
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --border-glass: rgba(0, 0, 0, 0.04);
            --text-primary: #0a0a1a;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --glow: 0 0 40px rgba(255, 0, 255, 0.02);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
            opacity: 0;
            animation: bodyFadeIn 0.8s ease forwards;
        }

        @keyframes bodyFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ===== LOADING ===== */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--bg-card);
            border-top-color: var(--accent);
            border-right-color: var(--accent2);
            border-bottom-color: var(--accent3);
            animation: spinLoader 1.4s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.1);
        }

        @keyframes spinLoader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            animation: pulseText 1.5s ease-in-out infinite;
            letter-spacing: 2px;
        }

        .loader-text span {
            color: var(--accent2);
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .loader-progress {
            margin-top: 1.5rem;
            width: 200px;
            height: 2px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            border-radius: 10px;
            animation: progressLoad 2s ease-in-out forwards;
        }

        @keyframes progressLoad {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        /* ===== BACKGROUND ===== */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 0, 255, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(108, 92, 231, 0.02) 0%, transparent 60%),
                var(--bg-primary);
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== GLASS ===== */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            box-shadow: var(--shadow), var(--glow);
            transition: var(--transition);
        }

        .glass:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 60px rgba(255, 0, 255, 0.06), var(--glow);
            border-color: rgba(255, 0, 255, 0.08);
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 0.8rem 2.5rem;
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3), var(--accent4));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease infinite;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .logo i {
            -webkit-text-fill-color: initial;
            color: var(--accent);
            animation: rotate 12s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            transform: translateX(-5px);
            border-color: transparent;
            box-shadow: 0 4px 30px rgba(255, 0, 255, 0.2);
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .theme-toggle::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .theme-toggle:hover::before {
            opacity: 0.15;
        }

        .theme-toggle:hover {
            transform: rotate(90deg) scale(1.1);
            border-color: var(--accent);
        }

        .theme-toggle i {
            position: relative;
            z-index: 1;
        }

        .version-badge {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 50px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            animation: pulseBadge 2s infinite;
            text-transform: uppercase;
        }

        @keyframes pulseBadge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ===== CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            padding: 100px 2.5rem 4rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .page-header .icon {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            display: block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .page-header .live-badge {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 1.5rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 0, 0, 0.12);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.15);
            animation: liveBadgePulse 2s infinite;
        }

        @keyframes liveBadgePulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.98);
            }
        }

        .page-header .live-badge .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: dotPulse 1.2s infinite;
        }

        @keyframes dotPulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.6);
            }
        }

        /* ===== LEAGUE TABS - Premium ===== */
        .league-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .league-tab {
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .league-tab::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: var(--transition);
        }

        .league-tab:hover::before {
            opacity: 0.08;
        }

        .league-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .league-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 30px rgba(255, 0, 255, 0.2);
            transform: translateY(-2px);
        }

        .league-tab .count {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.05rem 0.4rem;
            border-radius: 50px;
            font-size: 0.5rem;
            margin-left: 0.3rem;
        }

        /* ===== STREAMS CONTAINER ===== */
        .streams-container {
            display: none;
            animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .streams-container.active {
            display: block;
        }

        /* ===== MATCH CARD - Premium TV Style ===== */
        .match-card {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 1.8rem 2rem;
            margin-bottom: 1rem;
            transition: var(--transition);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            opacity: 0;
            transition: var(--transition);
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-card:hover {
            transform: translateY(-6px) scale(1.005);
            border-color: rgba(255, 0, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), var(--glow);
        }

        /* ===== LIVE MATCH CARD ===== */
        .match-card.live-match {
            border-color: rgba(255, 68, 68, 0.15);
            background: rgba(255, 0, 0, 0.02);
            animation: liveCardGlow 3s ease-in-out infinite;
        }

        @keyframes liveCardGlow {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.02);
            }
            50% {
                box-shadow: 0 0 60px rgba(255, 0, 0, 0.06);
            }
        }

        .match-card.live-match::before {
            opacity: 1;
            background: linear-gradient(90deg, #ff4444, #ff00ff, #ff4444);
            background-size: 200% 100%;
            animation: liveBorder 2.5s linear infinite;
        }

        @keyframes liveBorder {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        .match-card.live-match .live-flag {
            display: inline-flex !important;
        }

        .live-flag {
            display: none !important;
            align-items: center;
            gap: 0.4rem;
            padding: 0.15rem 0.8rem;
            background: rgba(255, 0, 0, 0.12);
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 0, 0.15);
            font-size: 0.6rem;
            font-weight: 700;
            color: #ff4444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: liveFlagPulse 1.5s infinite;
        }

        @keyframes liveFlagPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .match-card .match-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .match-card .match-teams {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .match-card .team {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .match-card .team .team-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: contain;
            background: var(--bg-card);
            padding: 6px;
            border: 2px solid var(--border-glass);
            transition: var(--transition);
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
        }

        .match-card .team .team-logo:hover {
            transform: scale(1.15) rotate(-8deg);
            border-color: var(--accent2);
            filter: drop-shadow(0 8px 20px rgba(255, 0, 255, 0.15));
        }

        .match-card .team .team-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .match-card .team .team-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .match-card .team .team-score {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--accent2);
            min-width: 35px;
            text-align: center;
            background: var(--bg-card);
            padding: 0 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border-glass);
            font-variant-numeric: tabular-nums;
            transition: var(--transition);
        }

        .match-card .team .team-score.winner {
            color: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.08);
        }

        .match-card .team .team-score.live-score {
            color: #ff4444;
            border-color: rgba(255, 68, 68, 0.2);
            animation: scorePulse 2s infinite;
        }

        @keyframes scorePulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .match-card .vs-badge {
            color: var(--text-muted);
            font-weight: 800;
            font-size: 0.7rem;
            padding: 0.3rem 0.8rem;
            background: var(--bg-card);
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            letter-spacing: 2px;
        }

        .match-card .match-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .match-card .status-badge {
            padding: 0.25rem 1rem;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-card .status-badge.live {
            background: rgba(255, 0, 0, 0.12);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.15);
            animation: livePulse 1.5s infinite;
        }

        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.98);
            }
        }

        .match-card .status-badge.final {
            background: rgba(0, 255, 136, 0.06);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.08);
        }

        .match-card .status-badge.scheduled {
            background: rgba(0, 212, 255, 0.06);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.08);
        }

        .match-card .league-name {
            font-size: 0.6rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0.15rem 0.7rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            font-weight: 600;
        }

        .match-card .match-time {
            font-size: 0.6rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--bg-card);
            padding: 0.15rem 0.7rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .match-card .match-time i {
            font-size: 0.5rem;
            color: var(--accent2);
        }

        .match-card .match-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-glass);
        }

        .match-card .watch-btn {
            padding: 0.6rem 2rem;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 4px 30px rgba(255, 0, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        .match-card .watch-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent2), var(--accent3));
            opacity: 0;
            transition: var(--transition);
        }

        .match-card .watch-btn:hover::before {
            opacity: 1;
        }

        .match-card .watch-btn i,
        .match-card .watch-btn span {
            position: relative;
            z-index: 1;
        }

        .match-card .watch-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 40px rgba(255, 0, 255, 0.3);
        }

        .match-card .watch-btn.live-btn {
            background: linear-gradient(135deg, #ff4444, #ff00ff);
            animation: btnPulse 2s infinite;
        }

        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 4px 30px rgba(255, 0, 255, 0.15);
            }
            50% {
                box-shadow: 0 8px 50px rgba(255, 0, 255, 0.35);
            }
        }

        .match-card .watch-btn.scheduled-btn {
            background: linear-gradient(135deg, #00d4ff, #6c5ce7);
        }

        .match-card .watch-btn.final-btn {
            background: linear-gradient(135deg, #00ff88, #6c5ce7);
            opacity: 0.6;
        }

        .match-card .watch-btn.final-btn:hover {
            opacity: 1;
        }

        .match-card .no-stream-text {
            font-size: 0.6rem;

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1500);
        });

        // ===== PARTICLES =====
        (function particles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            const particleCount = 50;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.2;
                    this.vy = (Math.random() - 0.5) * 0.2;
                    this.radius = Math.random() * 2 + 1;
                    this.opacity = Math.random() * 0.2 + 0.05;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    const accent = getComputedStyle(document.documentElement)
                        .getPropertyValue('--accent').trim() || '#ff00ff';
                    ctx.fillStyle = accent.replace(')', `, ${this.opacity})`).replace('rgb', 'rgba');
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const opacity = (1 - dist / 150) * 0.03;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const accent = getComputedStyle(document.documentElement)
                                .getPropertyValue('--accent').trim() || '#ff00ff';
                            ctx.strokeStyle = accent.replace(')', `, ${opacity})`).replace('rgb', 'rgba');
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                drawLines();
                requestAnimationFrame(animateParticles);
            }

            resize();
            initParticles();
            animateParticles();

            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });
        })();

        // ===== THEME =====
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');

        function getTheme() {
            return localStorage.getItem('theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        themeToggle.addEventListener('click', () => {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        setTheme(getTheme());

        // ===== API KEYS =====
        const API_KEY = '0b49416a2fc967201e8ff2d2e42fb852';

        const FOOTBALL_API = `https://v3.football.api-sports.io/fixtures?live=all&date=${new Date().toISOString().split('T')[0]}`;
        const BASKETBALL_API = `https://v1.basketball.api-sports.io/games?date=${new Date().toISOString().split('T')[0]}`;
        const BASEBALL_API = `https://v1.baseball.api-sports.io/games?date=${new Date().toISOString().split('T')[0]}`;
        const AFL_API = `https://v1.afl.api-sports.io/games?date=${new Date().toISOString().split('T')[0]}`;

        let allMatches = [];
        let liveMatches = [];

        async function fetchAllSports() {
            const container = document.getElementById('streamsContainer');
            const loading = document.getElementById('streamsLoading');

            try {
                const [footballRes, basketballRes, baseballRes, aflRes] = await Promise.all([
                    fetch(FOOTBALL_API, { headers: { 'x-apisports-key': API_KEY } }),
                    fetch(BASKETBALL_API, { headers: { 'x-apisports-key': API_KEY } }),
                    fetch(BASEBALL_API, { headers: { 'x-apisports-key': API_KEY } }),
                    fetch(AFL_API, { headers: { 'x-apisports-key': API_KEY } })
                ]);

                let allGames = [];

                // Football
                if (footballRes.ok) {
                    const data = await footballRes.json();
                    if (data.response) {
                        data.response.forEach(m => {
                            m._sport = 'football';
                            m._sportName = 'Football';
                            allGames.push(m);
                        });
                    }
                }

                // Basketball
                if (basketballRes.ok) {
                    const data = await basketballRes.json();
                    if (data.response) {
                        data.response.forEach(m => {
                            m._sport = 'basketball';
                            m._sportName = 'Basketball';
                            allGames.push(m);
                        });
                    }
                }

                // Baseball
                if (baseballRes.ok) {
                    const data = await baseballRes.json();
                    if (data.response) {
                        data.response.forEach(m => {
                            m._sport = 'baseball';
                            m._sportName = 'Baseball';
                            allGames.push(m);
                        });
                    }
                }

                // AFL
                if (aflRes.ok) {
                    const data = await aflRes.json();
                    if (data.response) {
                        data.response.forEach(m => {
                            m._sport = 'afl';
                            m._sportName = 'AFL';
                            allGames.push(m);
                        });
                    }
                }

                if (allGames.length === 0) {
                    container.innerHTML = `
                        <div class="no-streams">
                            <i class="fas fa-futbol"></i>
                            <p>No matches available right now</p>
                        </div>
                    `;
                    loading.style.display = 'none';
                    return;
                }

                allMatches = allGames;
                liveMatches = allGames.filter(m => {
                    const status = m.status?.short || m.status?.long || '';
                    return status === '1H' || status === '2H' || status === 'HT' || 
                           status === 'ET' || status === 'P' || status === 'Live' ||
                           status === 'In Progress' || status === 'Half Time' ||
                           status === 'Second Half' || status === 'First Half';
                });

                // Update counts
                document.getElementById('allCount').textContent = allGames.length;
                document.getElementById('footballCount').textContent = allGames.filter(m => m._sport === 'football').length;
                document.getElementById('basketballCount').textContent = allGames.filter(m => m._sport === 'basketball').length;
                document.getElementById('baseballCount').textContent = allGames.filter(m => m._sport === 'baseball').length;
                document.getElementById('aflCount').textContent = allGames.filter(m => m._sport === 'afl').length;

                // Render - show live first
                renderMatches('all', allGames);

            } catch (error) {
                console.error('Error fetching sports:', error);
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading streams. Please try again.</p>
                    </div>
                `;
            }

            loading.style.display = 'none';
        }

        function getStatusInfo(status) {
            const isLive = status === '1H' || status === '2H' || status === 'HT' || 
                          status === 'ET' || status === 'P' || status === 'Live' ||
                          status === 'In Progress' || status === 'Half Time' ||
                          status === 'Second Half' || status === 'First Half';
            const isFinal = status === 'FT' || status === 'Full Time' || status === 'Game Finished' || status === 'Finished';

            let statusClass = 'scheduled';
            let statusText = status || 'Scheduled';
            let btnClass = 'scheduled-btn';
            let btnText = 'Watch Now';

            if (isLive) {
                statusClass = 'live';
                statusText = '🔴 LIVE';
                btnClass = 'live-btn';
                btnText = '▶ Watch Live';
            } else if (isFinal) {
                statusClass = 'final';
                statusText = '✅ Full Time';
                btnClass = 'final-btn';
                btnText = '📹 Watch Replay';
            }

            return { statusClass, statusText, btnClass, btnText };
        }

        function getTeamData(match, side) {
            let team = match.teams?.[side];
            let score = match.scores?.[side]?.total ?? match.goals?.[side] ?? match.scores?.[side]?.score ?? 0;

            // For AFL: scores.home.score
            if (typeof score === 'undefined' && match.scores?.[side]?.score !== undefined) {
                score = match.scores[side].score;
            }

            return {
                id: team?.id,
                name: team?.name || side === 'home' ? 'Home' : 'Away',
                logo: team?.logo || '',
                score: score
            };
        }

        function getLeagueInfo(match) {
            if (match.league) {
                return {
                    name: match.league.name || 'Unknown',
                    logo: match.league.logo || '',
                    country: match.league.country || '',
                    id: match.league.id
                };
            }
            return { name: 'Unknown', logo: '', country: '' };
        }

        function formatTime(dateString) {
            if (!dateString) return 'Unknown';
            try {
                const date = new Date(dateString);
                return date.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return dateString;
            }
        }

        function renderMatches(sport, matches) {
            const container = document.getElementById('streamsContainer');

            let filtered = matches;
            if (sport !== 'all') {
                filtered = matches.filter(m => m._sport === sport);
            }

            // Sort: Live matches first
            filtered.sort((a, b) => {
                const aStatus = a.status?.short || a.status?.long || '';
                const bStatus = b.status?.short || b.status?.long || '';
                const aLive = aStatus === '1H' || aStatus === '2H' || aStatus === 'HT' || aStatus === 'Live';
                const bLive = bStatus === '1H' || bStatus === '2H' || bStatus === 'HT' || bStatus === 'Live';
                if (aLive && !bLive) return -1;
                if (!aLive && bLive) return 1;
                return 0;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-futbol"></i>
                        <p>No ${sport} matches available</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(match => {
                const home = getTeamData(match, 'home');
                const away = getTeamData(match, 'away');
                const league = getLeagueInfo(match);
                const status = match.status?.short || match.status?.long || 'Scheduled';
                const statusInfo = getStatusInfo(status);
                const isLive = statusInfo.statusClass === 'live';
                const isFinal = statusInfo.statusClass === 'final';

                const homeScore = home.score || '0';
                const awayScore = away.score || '0';
                const isHomeWinner = isFinal && parseInt(homeScore) > parseInt(awayScore);
                const isAwayWinner = isFinal && parseInt(awayScore) > parseInt(homeScore);

                const card = document.createElement('div');
                card.className = `match-card ${isLive ? 'live-match' : ''}`;

                card.innerHTML = `
                    <div class="match-top">
                        <div class="match-teams">
                            <div class="team">
                                <img class="team-logo" src="${home.logo || 'https://via.placeholder.com/50/ff00ff/ffffff?text=?'}" alt="${home.name}" onerror="this.src='https://via.placeholder.com/50/ff00ff/ffffff?text=?'" />
                                <div class="team-info">
                                    <span class="team-name">${home.name}</span>
                                    <span class="team-score ${isHomeWinner ? 'winner' : ''} ${isLive ? 'live-score' : ''}">${homeScore}</span>
                                </div>
                            </div>
                            <span class="vs-badge">VS</span>
                            <div class="team">
                                <img class="team-logo" src="${away.logo || 'https://via.placeholder.com/50/ff00ff/ffffff?text=?'}" alt="${away.name}" onerror="this.src='https://via.placeholder.com/50/ff00ff/ffffff?text=?'" />
                                <div class="team-info">
                                    <span class="team-name">${away.name}</span>
                                    <span class="team-score ${isAwayWinner ? 'winner' : ''} ${isLive ? 'live-score' : ''}">${awayScore}</span>
                                </div>
                            </div>
                        </div>
                        <div class="match-meta">
                            <span class="live-flag"><span class="dot" style="display:inline-block;width:6px;height:6px;background:#ff4444;border-radius:50%;margin-right:4px;animation:dotPulse 1.2s infinite;"></span> LIVE</span>
                            <span class="status-badge ${statusInfo.statusClass}">${statusInfo.statusText}</span>
                            <span class="league-name">${league.name || 'Unknown'}</span>
                            <span class="match-time">
                                <i class="far fa-clock"></i> ${formatTime(match.date)}
                            </span>
                            <span style="font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;opacity:0.4;">${match._sportName}</span>
                        </div>
                    </div>
                    <div class="match-bottom">
                        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
                            <button class="watch-btn ${statusInfo.btnClass}" onclick="window.open('https://www.google.com/search?q=watch+${encodeURIComponent(home.name)}+vs+${encodeURIComponent(away.name)}+live+stream','_blank')">
                                <i class="fas fa-play"></i>
                                <span>${statusInfo.btnText}</span>
                            </button>
                            <span class="stream-count">${match.streams ? match.streams.length : 0} streams</span>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ===== TABS =====
        document.querySelectorAll('.league-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.league-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const sport = tab.dataset.league;
                renderMatches(sport, allMatches);
            });
        });

        // ===== TOAST =====
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            toast.innerHTML = `<i class="fas ${iconMap[type] || iconMap.info}"></i> ${message}`;
            document.body.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // ===== FETCH =====
        fetchAllSports();

        // Refresh every 60 seconds
        setInterval(fetchAllSports, 60000);

        console.log('%c📺 DevSave Pro - World-Class Sports Streaming', 'font-size:24px; font-weight:bold; color:#ff00ff;');
        console.log('%c💻 Built with ❤️ by Dev Gift', 'font-size:14px; color:#a0a0c0;');
        console.log('%c🏆 Football | Basketball | Baseball | AFL', 'font-size:12px; color:#00d4ff;');
    </script>

</body>
</html>
