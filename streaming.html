<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports Streaming - DevSave Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --text-muted: #8080a0;
            --accent: #ff00ff;
            --accent2: #6c5ce7;
            --accent3: #00d4ff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 20px;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --glow: 0 0 40px rgba(255, 0, 255, 0.08);
        }

        [data-theme="light"] {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(0, 0, 0, 0.06);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8080a0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --glow: 0 0 40px rgba(255, 0, 255, 0.04);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
            opacity: 0;
            animation: bodyFadeIn 0.8s ease forwards;
        }

        @keyframes bodyFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            border-top-color: var(--accent);
            border-right-color: var(--accent2);
            border-bottom-color: var(--accent3);
            animation: spinLoader 1.2s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        @keyframes spinLoader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            margin-top: 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-secondary);
            animation: pulseText 1.5s ease-in-out infinite;
        }

        .loader-text span {
            color: var(--accent);
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loader-progress {
            margin-top: 1.5rem;
            width: 200px;
            height: 3px;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            border-radius: 10px;
            animation: progressLoad 2s ease-in-out forwards;
        }

        @keyframes progressLoad {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 0, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(108, 92, 231, 0.04) 0%, transparent 50%),
                var(--bg-primary);
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            box-shadow: var(--shadow), var(--glow);
            transition: var(--transition);
        }

        .glass:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(255, 0, 255, 0.08), var(--glow);
            border-color: rgba(255, 0, 255, 0.12);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff00ff, #6c5ce7, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease infinite;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .logo i {
            -webkit-text-fill-color: initial;
            color: #ff00ff;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateX(-5px);
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: rotate(90deg) scale(1.1);
            background: var(--accent);
            color: white;
        }

        .version-badge {
            background: linear-gradient(135deg, #ff00ff, #6c5ce7);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulseBadge 2s infinite;
        }

        @keyframes pulseBadge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 120px 2rem 4rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header .icon {
            font-size: 4rem;
            color: #ff00ff;
            margin-bottom: 1rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .page-header .active-status {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.12);
            animation: pulseActive 2s infinite;
        }

        @keyframes pulseActive {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .sports-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .sports-tab {
            padding: 0.7rem 2rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .sports-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .sports-tab.active {
            background: linear-gradient(135deg, #ff00ff, #6c5ce7);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(255, 0, 255, 0.25);
        }

        .sports-tab .count {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.1rem 0.6rem;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-left: 0.4rem;
        }

        .streams-container {
            display: none;
            animation: fadeUp 0.5s ease;
        }

        .streams-container.active {
            display: block;
        }

        .stream-card {
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stream-card:hover {
            border-color: var(--accent);
        }

        .stream-card .match-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .stream-card .team {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .stream-card .team img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: contain;
            background: var(--bg-card);
            padding: 3px;
        }

        .stream-card .team .name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stream-card .team .score {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--accent2);
            min-width: 25px;
            text-align: center;
        }

        .stream-card .vs {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.8rem;
        }

        .stream-card .status {
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .stream-card .status.live {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4444;
            animation: livePulse 1.5s infinite;
        }

        @keyframes livePulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .stream-card .status.final {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
        }

        .stream-card .status.scheduled {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .stream-card .watch-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #ff00ff, #6c5ce7);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stream-card .watch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 0, 255, 0.3);
        }

        .stream-card .league {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0.1rem 0.6rem;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
        }

        .streams-loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .streams-loading .spinner {
            animation: spin 1s linear infinite;
            font-size: 2rem;
            color: var(--accent2);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .no-streams {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .no-streams i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 65px;
            height: 65px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.2rem;
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            animation: whatsappPulse 2s ease-in-out infinite;
        }

        .whatsapp-float:hover {
            transform: scale(1.15) rotate(10deg);
            box-shadow: 0 12px 48px rgba(37, 211, 102, 0.45);
        }

        @keyframes whatsappPulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 48px rgba(37, 211, 102, 0.45);
            }
        }

        .whatsapp-float .tooltip {
            position: absolute;
            right: 80px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(10px);
            transition: var(--transition);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
        }

        .whatsapp-float:hover .tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        .footer {
            position: relative;
            z-index: 1;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--border-glass);
            margin-top: 4rem;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-socials a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .footer-socials a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, var(--accent2), transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .footer-socials a:hover::before {
            opacity: 0.08;
        }

        .footer-socials a:hover {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .footer-socials a.facebook:hover {
            color: #1877f2;
            border-color: #1877f2;
        }
        .footer-socials a.instagram:hover {
            color: #e4405f;
            border-color: #e4405f;
        }
        .footer-socials a.twitter:hover {
            color: #1da1f2;
            border-color: #1da1f2;
        }
        .footer-socials a.whatsapp:hover {
            color: #25d366;
            border-color: #25d366;
        }
        .footer-socials a.telegram:hover {
            color: #0088cc;
            border-color: #0088cc;
        }
        .footer-socials a.github:hover {
            color: #6e5494;
            border-color: #6e5494;
        }
        .footer-socials a.email:hover {
            color: #ea4335;
            border-color: #ea4335;
        }

        .footer-socials a i {
            position: relative;
            z-index: 1;
        }

        .footer p {
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .footer p a {
            color: #ff00ff;
            text-decoration: none;
            transition: var(--transition);
        }

        .footer p a:hover {
            color: #6c5ce7;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1rem 2rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            z-index: 9999;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: #00ff88;
        }
        .toast.success i {
            color: #00ff88;
        }
        .toast.error {
            border-color: #ff4444;
        }
        .toast.error i {
            color: #ff4444;
        }
        .toast.info {
            border-color: var(--accent2);
        }
        .toast.info i {
            color: var(--accent2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 100px 1rem 2rem;
            }
            .page-header h1 {
                font-size: 2rem;
            }
            .stream-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .stream-card .match-info {
                justify-content: center;
            }
            .sports-tab {
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }
            .navbar {
                padding: 0.8rem 1rem;
            }
            .logo {
                font-size: 1.4rem;
            }
            .back-btn span {
                display: none;
            }
            .whatsapp-float {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
                bottom: 20px;
                right: 20px;
            }
            .whatsapp-float .tooltip {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 1.5rem;
            }
            .stream-card .team .name {
                font-size: 0.8rem;
            }
            .stream-card .team .score {
                font-size: 1.1rem;
            }
            .stream-card .team img {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== LOADING ===== -->
    <div id="loadingOverlay">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading <span>Sports Streaming</span></div>
        <div class="loader-progress">
            <div class="loader-progress-bar"></div>
        </div>
    </div>

    <!-- ===== BACKGROUND ===== -->
    <div class="gradient-bg"></div>
    <canvas id="particles-canvas"></canvas>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-bolt"></i>
            DevSave Pro
        </a>
        <div class="nav-actions">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
            <span class="version-badge">v3.0</span>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <div class="container">
        <div class="page-header">
            <i class="fas fa-tv icon"></i>
            <h1>Sports Streaming</h1>
            <p>Watch live sports streams</p>
            <div class="active-status">
                <i class="fas fa-circle" style="font-size:0.5rem; margin-right:6px;"></i> Live
            </div>
        </div>

        <!-- ===== TABS ===== -->
        <div class="sports-tabs" id="tabs">

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1500);
        });

        // ===== PARTICLES =====
        (function particles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            const particleCount = 60;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.radius = Math.random() * 2 + 1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    const accent = getComputedStyle(document.documentElement)
                        .getPropertyValue('--accent').trim() || '#ff00ff';
                    ctx.fillStyle = accent.replace(')', `, ${this.opacity})`).replace('rgb', 'rgba');
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const opacity = (1 - dist / 150) * 0.08;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const accent = getComputedStyle(document.documentElement)
                                .getPropertyValue('--accent').trim() || '#ff00ff';
                            ctx.strokeStyle = accent.replace(')', `, ${opacity})`).replace('rgb', 'rgba');
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                drawLines();
                requestAnimationFrame(animateParticles);
            }

            resize();
            initParticles();
            animateParticles();

            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });
        })();

        // ===== THEME =====
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');

        function getTheme() {
            return localStorage.getItem('theme') || 'dark';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        themeToggle.addEventListener('click', () => {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        setTheme(getTheme());

        // ===== STREAMING API =====
        const FOOTBALL_STREAM_API = 'https://api.princetechn.com/api/football/streaming?apikey=prince';
        const BASKETBALL_STREAM_API = 'https://api.princetechn.com/api/football/streaming/basketball?apikey=prince';

        async function fetchFootballStreams() {
            const container = document.getElementById('footballContainer');
            const loading = document.getElementById('footballLoading');

            try {
                const response = await fetch(FOOTBALL_STREAM_API);

                if (response.ok) {
                    const data = await response.json();

                    if (data.success && data.result) {
                        renderFootballStreams(data.result);
                    } else {
                        container.innerHTML = `
                            <div class="no-streams">
                                <i class="fas fa-futbol"></i>
                                <p>No football streams available</p>
                            </div>
                        `;
                    }
                } else {
                    container.innerHTML = `
                        <div class="no-streams">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Failed to load football streams</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('Football streams error:', error);
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading streams. Please try again.</p>
                    </div>
                `;
            }

            loading.style.display = 'none';
        }

        async function fetchBasketballStreams() {
            const container = document.getElementById('basketballContainer');
            const loading = document.getElementById('basketballLoading');

            try {
                const response = await fetch(BASKETBALL_STREAM_API);

                if (response.ok) {
                    const data = await response.json();

                    if (data.success && data.result) {
                        renderBasketballStreams(data.result);
                    } else {
                        container.innerHTML = `
                            <div class="no-streams">
                                <i class="fas fa-basketball-ball"></i>
                                <p>No basketball streams available</p>
                            </div>
                        `;
                    }
                } else {
                    container.innerHTML = `
                        <div class="no-streams">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Failed to load basketball streams</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('Basketball streams error:', error);
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading streams. Please try again.</p>
                    </div>
                `;
            }

            loading.style.display = 'none';
        }

        function renderFootballStreams(data) {
            const container = document.getElementById('footballContainer');
            const matches = data.matches || [];

            document.getElementById('footballCount').textContent = data.totalMatches || matches.length;

            if (matches.length === 0) {
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-futbol"></i>
                        <p>No football streams available</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            matches.forEach(match => {
                const isLive = match.status === 'Live' || match.status === 'In Progress' || match.status === '1st Half' || match.status === '2nd Half';
                const isFinal = match.status === 'Full Time' || match.status === 'FT';
                const isScheduled = match.status === 'Not Started' || match.status === 'Scheduled';

                let statusClass = 'scheduled';
                let statusText = match.status || 'Scheduled';

                if (isLive) {
                    statusClass = 'live';
                    statusText = '🔴 LIVE';
                } else if (isFinal) {
                    statusClass = 'final';
                    statusText = '✅ Final';
                }

                const homeScore = match.homeScore || '0';
                const awayScore = match.awayScore || '0';
                const homeLogo = match.homeLogo || '';
                const awayLogo = match.awayLogo || '';
                const streamUrl = match.streams && match.streams.length > 0 ? match.streams[0].url : null;
                const streamTitle = match.streams && match.streams.length > 0 ? match.streams[0].title : 'Watch';

                const card = document.createElement('div');
                card.className = 'stream-card glass';

                card.innerHTML = `
                    <div class="match-info">
                        <div class="team">
                            ${homeLogo ? `<img src="${homeLogo}" alt="${match.homeTeam}" />` : ''}
                            <span class="name">${match.homeTeam || 'Home'}</span>
                            <span class="score">${homeScore}</span>
                        </div>
                        <span class="vs">VS</span>
                        <div class="team">
                            ${awayLogo ? `<img src="${awayLogo}" alt="${match.awayTeam}" />` : ''}
                            <span class="name">${match.awayTeam || 'Away'}</span>
                            <span class="score">${awayScore}</span>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap;">
                        <span class="status ${statusClass}">${statusText}</span>
                        <span class="league">${match.league || 'Unknown League'}</span>
                        ${streamUrl ? `
                            <a href="${streamUrl}" target="_blank" class="watch-btn">
                                <i class="fas fa-play"></i> ${streamTitle}
                            </a>
                        ` : `
                            <span style="font-size:0.7rem; color:var(--text-muted);">No stream available</span>
                        `}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function renderBasketballStreams(data) {
            const container = document.getElementById('basketballContainer');
            const matches = data.matches || [];

            document.getElementById('basketballCount').textContent = data.totalMatches || matches.length;

            if (matches.length === 0) {
                container.innerHTML = `
                    <div class="no-streams">
                        <i class="fas fa-basketball-ball"></i>
                        <p>No basketball streams available</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            matches.forEach(match => {
                const isLive = match.status === 'Live' || match.status === 'In Progress';
                const isFinal = match.status === 'Full Time' || match.status === 'FT' || match.status === 'Final';
                const isScheduled = match.status === 'Not Started' || match.status === 'Scheduled';

                let statusClass = 'scheduled';
                let statusText = match.status || 'Scheduled';

                if (isLive) {
                    statusClass = 'live';
                    statusText = '🔴 LIVE';
                } else if (isFinal) {
                    statusClass = 'final';
                    statusText = '✅ Final';
                }

                const homeScore = match.homeScore || '0';
                const awayScore = match.awayScore || '0';
                const homeLogo = match.homeLogo || '';
                const awayLogo = match.awayLogo || '';
                const streamUrl = match.streams && match.streams.length > 0 ? match.streams[0].url : null;
                const streamTitle = match.streams && match.streams.length > 0 ? match.streams[0].title : 'Watch';

                const card = document.createElement('div');
                card.className = 'stream-card glass';

                card.innerHTML = `
                    <div class="match-info">
                        <div class="team">
                            ${homeLogo ? `<img src="${homeLogo}" alt="${match.homeTeam}" />` : ''}
                            <span class="name">${match.homeTeam || 'Home'}</span>
                            <span class="score">${homeScore}</span>
                        </div>
                        <span class="vs">VS</span>
                        <div class="team">
                            ${awayLogo ? `<img src="${awayLogo}" alt="${match.awayTeam}" />` : ''}
                            <span class="name">${match.awayTeam || 'Away'}</span>
                            <span class="score">${awayScore}</span>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap;">
                        <span class="status ${statusClass}">${statusText}</span>
                        <span class="league">${match.league || 'Unknown League'}</span>
                        ${streamUrl ? `
                            <a href="${streamUrl}" target="_blank" class="watch-btn">
                                <i class="fas fa-play"></i> ${streamTitle}
                            </a>
                        ` : `
                            <span style="font-size:0.7rem; color:var(--text-muted);">No stream available</span>
                        `}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ===== TABS =====
        document.querySelectorAll('.sports-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.sports-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const sport = tab.dataset.sport;
                document.querySelectorAll('.streams-container').forEach(c => c.classList.remove('active'));
                document.getElementById(sport + 'Container').classList.add('active');
            });
        });

        // ===== TOAST =====
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            toast.innerHTML = `<i class="fas ${iconMap[type] || iconMap.info}"></i> ${message}`;
            document.body.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        // ===== FETCH ON LOAD =====
        fetchFootballStreams();
        fetchBasketballStreams();

        // Refresh every 60 seconds
        setInterval(fetchFootballStreams, 60000);
        setInterval(fetchBasketballStreams, 60000);

        console.log('%c📺 DevSave Pro - Sports Streaming', 'font-size:20px; font-weight:bold; color:#ff00ff;');
        console.log('%c💻 Built with ❤️ by Dev Gift', 'font-size:14px; color:#a0a0c0;');
    </script>
